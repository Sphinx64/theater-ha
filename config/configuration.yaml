# CORS für Visualizer
http:
  cors_allowed_origins:
    - "http://localhost"
    - "http://127.0.0.1"
    - "null"

# Zusätzliches Lovelace-Dashboard: alle Scripts zum Testen (YAML-Datei unten)
lovelace:
  dashboards:
    theater-scripts-test:
      mode: yaml
      title: Theater – Script-Test
      icon: mdi:script-text-outline
      show_in_sidebar: true
      filename: theater_scripts_test_dashboard.yaml

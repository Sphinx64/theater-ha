theater_streit_lauf_v2:
  alias: 'Theater: Streit – Phasen 1–6'
  icon: mdi:lightning-bolt
  mode: restart
  fields:
    skip_entity_id:
      description: Veraltet – ignoriert
      required: false
      selector:
        text: {}
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_streit_lauf_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - repeat:
      while:
        - condition: template
          value_template: 'true'
      sequence:
      - variables:
          p: '{{ states(''input_number.theater_streit_phase'') | int(1) }}'
          s: '{{ states(''input_number.theater_master_speed'') | int(50) }}'
          br: '{{ [(states(''input_number.theater_master_brightness'') | float(500) / 10) | int, 100] | min }}'
          lamp: '{{ ''light.l'' + (range(1, 13) | random | string) }}'
          ri: '{{ range(2) | random }}'
          fr: '{% if p in [1,4] and ri|int==0 %}255{% elif p in [1,4] %}0{% elif p
            in [2,5] and ri|int==0 %}255{% elif p in [2,5] %}255{% elif p in [3,6]
            and ri|int==0 %}255{% elif p in [3,6] %}0{% else %}255{% endif %}'
          fg: '{% if p in [1,4] and ri|int==0 %}36{% elif p in [1,4] %}150{% elif
            p in [2,5] and ri|int==0 %}0{% elif p in [2,5] %}255{% elif p in [3,6]
            and ri|int==0 %}126{% else %}150{% endif %}'
          fb: '{% if p in [1,4] and ri|int==0 %}3{% elif p in [1,4] %}255{% elif p
            in [2,5] and ri|int==0 %}0{% elif p in [2,5] %}0{% elif p in [3,6] and
            ri|int==0 %}13{% else %}255{% endif %}'
          cr: '{% if p in [1,4] %}255{% elif p in [2,5] %}0{% elif p in [3,6] %}255{%
            else %}252{% endif %}'
          cg: '{% if p in [1,4] %}126{% elif p in [2,5] %}150{% elif p in [3,6] %}36{%
            else %}237{% endif %}'
          cb: '{% if p in [1,4] %}13{% elif p in [2,5] %}255{% elif p in [3,6] %}3{%
            else %}255{% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{{ [fr|int, fg|int, fb|int] }}'
          brightness_pct: 100
          transition: 0
      - delay:
          milliseconds: '{{ [480 - s * 3.5, 85] | max }}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{{ [cr|int, cg|int, cb|int] }}'
          brightness_pct: '{{ br }}'
          transition: 0
      - delay:
          milliseconds: '{% set p = states(''input_number.theater_streit_phase'')
            | int(1) %}{% set s = states(''input_number.theater_master_speed'') |
            int(50) %}{% set w = ([420 - s * 7.5, 32] | max) | int %}{% if p in [4,5,6]
            %}{{ (w * 0.42) | int }}{% else %}{{ (w * 0.58) | int }}{% endif %}'
theater_streit_p7_v2:
  alias: 'Theater: Streit Phase 7 – R/B/Y → Grau (15 s)'
  icon: mdi:lightning-bolt-circle
  mode: restart
  fields:
    skip_entity_id:
      description: Veraltet – ohne Wirkung (Skip über input_text.theater_master_stop_skip)
      required: false
      selector:
        text: {}
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_streit_p7_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: light.turn_on
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
    data:
      rgb_color:
      - 255
      - 0
      - 0
      brightness_pct: '{{ [(states(''input_number.theater_master_brightness'') | float(500) / 10) | int, 50] | min }}'
      transition: 0
  - repeat:
      while:
      - condition: template
        value_template: "{% set ts = state_attr('script.theater_streit_p7_v2', 'last_triggered')
          %}{% set t = (now().timestamp() - as_timestamp(ts)) if ts else 0 %}{{ t <
          15.0 }}"
      sequence:
      - parallel:
        - action: light.turn_on
          target:
            entity_id: light.l1
          data:
            rgb_color: "{% set ts = state_attr('script.theater_streit_p7_v2', 'last_triggered')
              %}{% set t = (now().timestamp() - as_timestamp(ts)) if ts else 0 %}{%
              set step = ([(t * 10 / 15) | int, 10] | min) %}{% set mix = step / 10.0
              %}{% set sp = 12 %}{% set ni = 1 %}{% set ph = ((t * sp + ni * 0.37) |
              int) % 3 %}{% if ph == 0 %}{% set r,g,b = 255,0,0 %}{% elif ph == 1
              %}{% set r,g,b = 0,0,255 %}{% else %}{% set r,g,b = 255,126,13 %}{% endif
              %}{{ [(r * (1 - mix) + 252 * mix) | round | int, (g * (1 - mix) + 237
              * mix) | round | int, (b * (1 - mix) + 255 * mix) | round | int] }}"
            brightness_pct: '{% set ts = state_attr(''script.theater_streit_p7_v2'', ''last_triggered'')
              %}{% set t = (now().timestamp() - as_timestamp(ts)) if ts else 0 %}{%
              set step = ([(t * 10 / 15) | int, 10] | min) %}{% set mix = step / 10.0
              %}{% set m = (states(''input_number.theater_master_brightness'') | float(500) / 10) | int %}{% set b_hi = [m, 50] | min %}{% set b_end = [m, 1] | min %}{% set b
              = ((b_hi * (1 - mix) + b_end * mix) | round | int) %}{{ [b, 1] | max }}'
            transition: 0
        - action: light.turn_on
          target:
            entity_id: light.l2
          data:
            rgb_color: "{% set ts = state_attr('script.theater_streit_p7_v2', 'last_triggered')
              %}{% set t = (now().timestamp() - as_timestamp(ts)) if ts else 0 %}{%
              set step = ([(t * 10 / 15) | int, 10] | min) %}{% set mix = step / 10.0
              %}{% set sp = 12 %}{% set ni = 2 %}{% set ph = ((t * sp + ni * 0.37) |
              int) % 3 %}{% if ph == 0 %}{% set r,g,b = 255,0,0 %}{% elif ph == 1
              %}{% set r,g,b = 0,0,255 %}{% else %}{% set r,g,b = 255,126,13 %}{% endif
              %}{{ [(r * (1 - mix) + 252 * mix) | round | int, (g * (1 - mix) + 237
              * mix) | round | int, (b * (1 - mix) + 255 * mix) | round | int] }}"
            brightness_pct: '{% set ts = state_attr(''script.theater_streit_p7_v2'', ''last_triggered'')

                (states(''input_text.theater_farbe_blau'') if '','' in states(''input_text.theater_farbe_blau'')
                else ''0,150,255'')] %} {{ options | random }}'
              base_color: '{{ states(''input_text.theater_farbe_rot'') if '','' in
                states(''input_text.theater_farbe_rot'') else ''255,0,0'' }}'
              master_br: '{{ [(states(''input_number.theater_master_brightness'') | float(500) / 10) | int, 100] | min }}'
              flash_sec: '{% set s = states(''input_number.theater_master_speed'')
                | int(50) %} {{ [100, 400 - s * 3] | max / 1000 }}'
              wait_sec: '{% set s = states(''input_number.theater_master_speed'')
                | int(50) %} {% set base = [100, 3000 - s * 29] | max %} {% set jit
                = range(0, [100, 2000 - s * 19] | max) | random %} {{ (base + jit)
                / 1000 }}'
          - action: light.turn_on
            target:
              entity_id: light.l12
            data:
              rgb_color: '{% set p=[1,2,3,1,2,3,4,5][(([states(''input_number.theater_streit_phase'')|int(1),8]|min)-1)]
                %}{%set cg=states(''input_text.theater_farbe_gelb'') %}{%set cg=cg
                if'',''in cg else''255,126,13'' %}{%set cb=states(''input_text.theater_farbe_blau'')
                %}{%set cb=cb if'',''in cb else''0,150,255'' %}{%set cr=states(''input_text.theater_farbe_rot'')
                %}{%set cr=cr if'',''in cr else''255,0,0'' %}{%if p==1%}{%set c=cr
                if range(0,2)|random==0 else cb%}{%elif p==2%}{%set r3=range(0,3)|random%}{%set
                c=cb if r3==0 else(cg if r3==1 else cr)%}{%elif p==3%}{%set c=cg if
                range(0,2)|random==0 else cb%}{%elif p==5%}{%set c=[''220,175,100'',''90,155,225'',''210,80,95'']|random%}{%else%}{%set
                r=range(0,3)|random%}{%set c=cg if r==0 else(cb if r==1 else cr)%}{%endif%}{{c.split('','')|map(''int'')|list}}'
              brightness_pct: 100
              transition: 0
          - delay: '{{ flash_sec }}'
          - action: light.turn_on
            target:
              entity_id: light.l12
            data:
              rgb_color: '{% set p=[1,2,3,1,2,3,4,5][(([states(''input_number.theater_streit_phase'')|int(1),8]|min)-1)]
                %}{%set cg=states(''input_text.theater_farbe_gelb'') %}{%set cg=cg
                if'',''in cg else''255,126,13'' %}{%set cb=states(''input_text.theater_farbe_blau'')
                %}{%set cb=cb if'',''in cb else''0,150,255'' %}{%set cr=states(''input_text.theater_farbe_rot'')
                %}{%set cr=cr if'',''in cr else''255,0,0'' %}{%if p==1%}{%set c=cr
                if range(0,2)|random==0 else cb%}{%elif p==2%}{%set r3=range(0,3)|random%}{%set
                c=cb if r3==0 else(cg if r3==1 else cr)%}{%elif p==3%}{%set c=cg if
                range(0,2)|random==0 else cb%}{%elif p==5%}{%set c=[''220,175,100'',''90,155,225'',''210,80,95'']|random%}{%else%}{%set
                r=range(0,3)|random%}{%set c=cg if r==0 else(cb if r==1 else cr)%}{%endif%}{{c.split('','')|map(''int'')|list}}'
              brightness_pct: '50'
              transition: 0
          - delay: '{{ wait_sec }}'
theater_master_stop_v2:
  alias: 'Theater: Master Stop v2'
  icon: mdi:stop
  mode: restart
  sequence:
  - variables:
      skip: "{{ states('input_text.theater_master_stop_skip') }}"
  - repeat:
      for_each:
      - script.theater_neutral_v2
      - script.theater_blau_v2
      - script.theater_rot_v2
      - script.theater_gelb_v2
      - script.theater_grau_v2
      - script.theater_streit_lauf_v2
      - script.theater_streit_p7_v2
      - script.theater_streit_phase_1_v2
      - script.theater_streit_phase_2_v2
      - script.theater_streit_phase_3_v2
      - script.theater_finale_v2
      - script.theater_finale_helper_v2
      sequence:
      - condition: template
        value_template: "{{ repeat.item != skip }}"
      - action: script.turn_off
        target:
          entity_id: "{{ repeat.item }}"
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: ''
theater_blackout_v2:
  alias: 'Theater: Blackout'
  icon: mdi:lightbulb-off
  mode: restart
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: ''
  - action: script.theater_master_stop_v2
  - action: light.turn_off
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
theater_finale_helper_v2:
  alias: 'Theater: Finale Helper'
  icon: mdi:palette
  mode: parallel
  max: 12
  fields:
    lamp:
      description: Lampen-Entity-ID
    start_hue:
      description: Start-Farbton (0-359)
  sequence:
  - variables:
      start_time: '{{ now().timestamp() }}'
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - variables:
          s: "{{ states('input_number.theater_master_speed') | float(50) }}"
          cycle_sec: "{{ [30, 300 - s * 2.7] | max | round(1) }}"
          step_sec: "{{ [0.3, (cycle_sec / 360)] | max | round(2) }}"
          elapsed: '{{ now().timestamp() - start_time }}'
          hue: "{{ ((start_hue | float + (elapsed / cycle_sec * 360)) % 360) | round(1) }}"
          br: "{{ [(states('input_number.theater_master_brightness') | float(500) / 10) | int, 100] | min }}"
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          hs_color:
          - '{{ hue }}'
          - 100
          brightness_pct: '{{ br }}'
          transition: '{{ step_sec }}'
      - delay: '{{ step_sec }}'
theater_finale_v2:
  alias: 'Theater: Finale'
  icon: mdi:rainbow

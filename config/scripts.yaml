theater_regen_v2:
  alias: 'Theater: Regen v2'
  icon: mdi:weather-pouring
  mode: restart
  description: >-
    Regentropfen-Effekt. Phase 1 (~15s): einzelne Tropfen in rot/blau/gelb
    (nie gleiche Farbe oder Lampe direkt hintereinander). Phase 2 (endlos):
    mehrere ueberlappende Tropfen in 12 Regenbogenfarben. Tempo ueber
    input_number.theater_master_speed; Helligkeit des Tropfens selbst ist fix.
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_regen_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: light.turn_off
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_regen_last_color
    data:
      value: "99"
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_regen_last_lamp
    data:
      value: "0"
  - variables:
      start_time: "{{ now().timestamp() }}"
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - variables:
          s: "{{ states('input_number.theater_master_speed') | float(50) }}"
          base_delay_ms: >-
            {% if s <= 25 %}{{ (3000 - s * 60) | int }}{% else %}{{ [(1400 - (s - 25) * 17) | int, 120] | max | int }}{% endif %}
          jitter_ms: "{{ range(0, (base_delay_ms // 3) + 1) | random }}"
          total_delay_ms: "{{ base_delay_ms + jitter_ms }}"
          last_color_idx: "{{ states('input_text.theater_regen_last_color') | int(99) }}"
          last_lamp_num: "{{ states('input_text.theater_regen_last_lamp') | int(0) }}"
          new_color_idx: >-
            {% if s <= 25 %}{% if last_color_idx >= 3 %}{{ range(3) | random }}{% else %}{% set offset = [1, 2] | random %}{{ (last_color_idx + offset) % 3 }}{% endif %}{% else %}{% set c = range(12) | random %}{{ c if c != (last_color_idx | int) else (c + 1) % 12 }}{% endif %}
          new_lamp_num: >-
            {% if last_lamp_num < 1 or last_lamp_num > 12 %}{{ range(1, 13) | random }}{% else %}{% set offset = range(1, 12) | random %}{{ ((last_lamp_num - 1 + offset) % 12) + 1 }}{% endif %}
          rainbow_palette: "{{ [[255,0,0],[255,128,0],[255,255,0],[128,255,0],[0,255,0],[0,255,128],[0,255,255],[0,128,255],[0,0,255],[128,0,255],[255,0,255],[255,0,128]] }}"
          drop_rgb: >-
            {% if s <= 25 %}
            {% set cg = states('input_text.theater_farbe_gelb') %}{% set cg = cg if ',' in cg else '255,126,13' %}
            {% set cb = states('input_text.theater_farbe_blau') %}{% set cb = cb if ',' in cb else '0,150,255' %}
            {% set cr = states('input_text.theater_farbe_rot') %}{% set cr = cr if ',' in cr else '255,0,0' %}
            {% if new_color_idx | int == 0 %}{{ cg.split(',') | map('int') | list }}{% elif new_color_idx | int == 1 %}{{ cb.split(',') | map('int') | list }}{% else %}{{ cr.split(',') | map('int') | list }}{% endif %}
            {% else %}{{ rainbow_palette[new_color_idx | int] }}{% endif %}
          new_lamp: "light.l{{ new_lamp_num }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.theater_regen_last_color
        data:
          value: "{{ new_color_idx }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.theater_regen_last_lamp
        data:
          value: "{{ new_lamp_num }}"
      - action: script.einzeltropfen
        data:
          target_light: "{{ new_lamp }}"
          drop_color: "{{ drop_rgb }}"
      - delay:
          milliseconds: "{{ total_delay_ms }}"
theater_streit_flash_helper_v2:
  alias: 'Theater: Streit Flash Helper'
  icon: mdi:flash
  mode: parallel
  max: 50
  fields:
    lamp:
      description: Ziel-Lampen-Entity (z.B. light.l1)
    base_name:
      description: "Basisfarbe: 'gelb' | 'blau' | 'rot'"
    flash1_name:
      description: "Erste Flash-Farbe"
    flash2_name:
      description: "Zweite Flash-Farbe"
  sequence:
  - delay:
      milliseconds: "{{ range(100, 2500) | random }}"
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - variables:
          s: "{{ states('input_number.theater_master_speed') | int(50) }}"
          flash_name: "{{ flash1_name if (range(2) | random) == 0 else flash2_name }}"
          flash_ms: "{{ [(280 - s * 2) | int, 90] | max | int }}"
          wait_ms: "{{ [(2500 - s * 22) | int, 200] | max | int + (range(0, 800) | random) }}"
      - action: light.turn_on
        target:
          entity_id: "{{ lamp }}"
        data:
          rgb_color: "{% set fs = states('input_text.theater_farbe_' ~ flash_name) %}{{ (fs if ',' in fs else '255,255,255').split(',') | map('int') | list }}"
          brightness_pct: 100
          transition: 0
      - delay:
          milliseconds: "{{ flash_ms }}"
      - action: light.turn_on
        target:
          entity_id: "{{ lamp }}"
        data:
          rgb_color: "{% set bs = states('input_text.theater_farbe_' ~ base_name) %}{{ (bs if ',' in bs else '255,255,255').split(',') | map('int') | list }}"
          brightness_pct: 50
          transition: 0.2
      - delay:
          milliseconds: "{{ wait_ms }}"
theater_streit_chaos_helper_v2:
  alias: 'Theater: Streit Chaos Helper'
  icon: mdi:shuffle-variant
  mode: parallel
  max: 12
  fields:
    lamp:
      description: Ziel-Lampen-Entity
  sequence:
  - variables:
      chaos_start: "{{ now().timestamp() }}"
  - repeat:
      while:
      - condition: template
        value_template: "{{ (now().timestamp() - (chaos_start | float(0))) < 12 }}"
      sequence:
      - variables:
          elapsed: "{{ now().timestamp() - (chaos_start | float(0)) }}"
          chaos_br: "{{ [(100 - (elapsed | float(0) / 12 * 100)) | int, 0] | max }}"
          s: "{{ states('input_number.theater_master_speed') | int(50) }}"
          color_name: "{{ ['gelb','blau','rot'] | random }}"
      - action: light.turn_on
        target:
          entity_id: "{{ lamp }}"
        data:
          rgb_color: "{% set cs = states('input_text.theater_farbe_' ~ color_name) %}{{ (cs if ',' in cs else '255,255,255').split(',') | map('int') | list }}"
          brightness_pct: "{{ chaos_br }}"
          transition: 0
      - delay:
          milliseconds: "{{ [(300 - s * 2) | int, 120] | max | int + (range(0, 200) | random) }}"

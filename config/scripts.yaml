          brightness_pct: '{{ [(states(''input_number.theater_master_brightness'') | float(500) / 10) | int, 100] | min }}'
          transition: '{{ [3.5 - (s / 100.0) * 3.2, 0.2] | max | round(2) }}'
      - delay: '00:00:03.5'
theater_streit_lauf_v2:
  alias: 'Theater: Streit – Phasen 1–6'
  icon: mdi:lightning-bolt
  mode: restart
  fields:
    skip_entity_id:
      description: Veraltet – ignoriert
      required: false
      selector:
        text: {}
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_streit_lauf_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_streit_last_lamp
    data:
      value: "0"
  - repeat:
      while:
        - condition: template
          value_template: 'true'
      sequence:
      - variables:
          p: '{{ states(''input_number.theater_streit_phase'') | int(1) }}'
          s: '{{ states(''input_number.theater_master_speed'') | int(50) }}'
          br: '{{ [(states(''input_number.theater_master_brightness'') | float(500) / 10) | int, 100] | min }}'
          lamp: >-
            {% set last = states('input_text.theater_streit_last_lamp') | int(0) %}{% set k = range(1, 13) | random %}{% if last >= 1 and last <= 12 and k == last %}light.l{{ (k % 12) + 1 }}{% else %}light.l{{ k }}{% endif %}
          ri: '{{ range(2) | random }}'
          fr: '{% if p in [1,4] and ri|int==0 %}255{% elif p in [1,4] %}0{% elif p
            in [2,5] and ri|int==0 %}255{% elif p in [2,5] %}255{% elif p in [3,6]
            and ri|int==0 %}255{% elif p in [3,6] %}0{% else %}255{% endif %}'
          fg: '{% if p in [1,4] and ri|int==0 %}36{% elif p in [1,4] %}150{% elif
            p in [2,5] and ri|int==0 %}0{% elif p in [2,5] %}255{% elif p in [3,6]
            and ri|int==0 %}126{% else %}150{% endif %}'
          fb: '{% if p in [1,4] and ri|int==0 %}3{% elif p in [1,4] %}255{% elif p
            in [2,5] and ri|int==0 %}0{% elif p in [2,5] %}0{% elif p in [3,6] and
            ri|int==0 %}13{% else %}255{% endif %}'
          cr: '{% if p in [1,4] %}255{% elif p in [2,5] %}0{% elif p in [3,6] %}255{%
            else %}252{% endif %}'
          cg: '{% if p in [1,4] %}126{% elif p in [2,5] %}150{% elif p in [3,6] %}36{%
            else %}237{% endif %}'
          cb: '{% if p in [1,4] %}13{% elif p in [2,5] %}255{% elif p in [3,6] %}3{%
            else %}255{% endif %}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{{ [fr|int, fg|int, fb|int] }}'
          brightness_pct: 100
          transition: 0
      - delay:
          milliseconds: '{{ [480 - s * 3.5, 85] | max }}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{{ [cr|int, cg|int, cb|int] }}'
          brightness_pct: '{{ br }}'
          transition: 0
      - action: input_text.set_value
        target:
          entity_id: input_text.theater_streit_last_lamp
        data:
          value: "{{ lamp | replace('light.l', '') }}"
      - delay:
          milliseconds: '{% set p = states(''input_number.theater_streit_phase'')
            | int(1) %}{% set s = states(''input_number.theater_master_speed'') |
            int(50) %}{% set w = ([420 - s * 7.5, 32] | max) | int %}{% if p in [4,5,6]
            %}{{ (w * 0.42) | int }}{% else %}{{ (w * 0.58) | int }}{% endif %}'

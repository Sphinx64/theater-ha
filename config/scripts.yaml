theater_streit_phase_1_v2:
  alias: 'Theater: Streit Phase 1 (Gelb) v2'
  icon: mdi:circle
  mode: restart
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_streit_phase_1_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: light.turn_on
    target:
      entity_id:
      - light.l1

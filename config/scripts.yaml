    data:
      rgb_color: '{% set c = states(''input_text.theater_farbe_gelb'') %}{{ (c if
        '','' in c else ''255,126,13'').split('','') | map(''int'') | list }}'
      brightness_pct: '50'
      transition: 0
  - parallel:
    - sequence:
      - delay: '{% set s = states(''input_number.theater_master_speed'') | int(50)
          %} {% set base = [100, 3000 - s * 29] | max %} {% set jit = range(0, [100,
          2000 - s * 19] | max) | random %} {{ (base + jit) / 1000 }}'

theater_master_stop_v2:
  alias: 'Theater: Master Stop v2'
  icon: mdi:stop
  mode: restart
  sequence:
  - variables:
      skip: "{{ states('input_text.theater_master_stop_skip') }}"
  - repeat:
      for_each:
      - script.theater_neutral_v2
      - script.theater_blau_v2
      - script.theater_rot_v2
      - script.theater_gelb_v2
      - script.theater_giftgelb_v2
      - script.theater_grau_v2
      - script.theater_streit_lauf_v2
      - script.theater_streit_p7_v2
      - script.theater_streit_phase_1_v2
      - script.theater_streit_phase_2_v2
      - script.theater_streit_phase_3_v2
      - script.theater_streit_phase_4_v2
      - script.theater_streit_phase_5_v2
      - script.theater_streit_phase_6_v2
      - script.theater_finale_v2

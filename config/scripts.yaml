einzeltropfen:
  alias: Einzeltropfen
  mode: parallel
  fields:
    target_light:
      description: Welche Lampe?
    drop_color:
      description: Farbe
  sequence:
  - target:
      entity_id: '{{ target_light }}'
    data:
      rgb_color: '{{ drop_color }}'
      brightness_pct: 100
    action: light.turn_on
  - delay:
      milliseconds: 300
  - target:
      entity_id: '{{ target_light }}'
    action: light.turn_off
  description: ''

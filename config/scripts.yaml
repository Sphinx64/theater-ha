# ========= BEAMER (Xgimi Horizon via Android TV Remote Integration) =========
# Funktionieren NUR wenn im HA die Integration "Android TV Remote" eingerichtet
# ist und die Entity remote.xgimi_horizon existiert. Lokal wahrscheinlich nicht.

beamer_f1:
  alias: 'Beamer: F1 (Bild schwarz)'
  description: F1, dann Vol-Up/Vol-Down — weckt die Fernbedienung wieder auf.
  icon: mdi:keyboard-f1
  mode: single
  sequence:
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: F1
    - delay: '00:00:01'
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: VOLUME_UP
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: VOLUME_DOWN

beamer_f1_robust:
  alias: 'Beamer: F1 robust (mit Pre-Wakeup)'
  description: Erst Vol-Up/Down zum Wecken, dann F1. Fallback falls beamer_f1 streikt.
  icon: mdi:keyboard-f1
  mode: single
  sequence:
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: VOLUME_UP
    - delay: '00:00:00.3'
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: VOLUME_DOWN
    - delay: '00:00:00.5'
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: F1
    - delay: '00:00:01'
    # Zweiter F1-Versuch falls der erste im Wakeup unterging
    - action: remote.send_command
      target:
        entity_id: remote.xgimi_horizon
      data:
        command: F1

beamer_home:

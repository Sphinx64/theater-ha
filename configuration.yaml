# Theater Testsetup - configuration.yaml
# 12 virtuelle Lampen über MQTT (mosquitto Container)

default_config:

logger:
  default: info
  logs:
    homeassistant.components.script: debug
    homeassistant.components.mqtt: info

script: !include scripts.yaml

# ============================================================
# Input Helpers
# ============================================================
input_number:
  theater_master_brightness:
    name: Master Helligkeit
    min: 0
    max: 1000
    step: 10
    initial: 500
    mode: slider

  theater_master_speed:
    name: Master Speed
    min: 0
    max: 100
    step: 1
    initial: 50
    mode: slider

  theater_streit_phase:
    name: Streit-Phase
    min: 1
    max: 8
    step: 1
    initial: 1
    mode: slider

input_text:
  theater_farbe_gelb:
    name: Farbe Gelb (R,G,B)
    initial: "255,126,13"
    max: 20

  theater_farbe_blau:
    name: Farbe Blau (R,G,B)
    initial: "0,150,255"
    max: 20

  theater_farbe_rot:
    name: Farbe Rot (R,G,B)
    initial: "255,0,0"
    max: 20

  theater_master_stop_skip:
    name: Master-Stop-Skip
    initial: ""
    max: 100

# ============================================================
# 12 virtuelle Lampen via MQTT
# Jede Lampe published ihre State-Änderungen als JSON auf
#   theater/light/lN/state
# Das nutzt der Visualizer, um live zu rendern.
# ============================================================
mqtt:
  light:
    - name: "Lampe 1"
      unique_id: theater_l1
      object_id: l1
      schema: json
      command_topic: "theater/light/l1/set"
      state_topic: "theater/light/l1/state"
      brightness: true
      supported_color_modes: ["rgb"]
      optimistic: true
